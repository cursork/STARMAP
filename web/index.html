<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARMAP animation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0a0a1a; color: #ccc; padding: 2rem; }
  h1 { font-size: 1.4rem; color: #999; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 600px; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 0.3rem; }
  .field.full { grid-column: 1 / -1; }
  label { font-size: 0.85rem; color: #888; }
  input[type="date"], input[type="number"] {
    background: #1a1a2e; border: 1px solid #333; color: #ccc;
    padding: 0.5rem; font-family: inherit; font-size: 0.95rem;
  }
  input:focus { outline: none; border-color: #4fc3f7; }
  .row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  button { background: #1a1a2e; border: 1px solid #4fc3f7; color: #4fc3f7; padding: 0.6rem 1.5rem;
           font-family: inherit; font-size: 0.95rem; cursor: pointer; }
  button:hover { background: #4fc3f7; color: #0a0a1a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .check-row { display: flex; gap: 1.5rem; align-items: center; margin-top: 0.5rem; }
  .check-row label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.85rem; color: #888; }
  .check-row input[type="checkbox"] { accent-color: #4fc3f7; }
  #status { margin: 1rem 0; color: #888; min-height: 1.5rem; }
  #status.error { color: #f44; }
  .help { font-size: 0.75rem; color: #555; margin-top: 0.2rem; }
</style>
</head>
<body>

<h1>STARMAP animation generator</h1>

<div class="form-grid">
  <div class="field">
    <label>Start date</label>
    <input type="date" id="startDate" value="1974-05-15">
  </div>
  <div class="field">
    <label>End date</label>
    <input type="date" id="endDate" value="1974-06-14">
  </div>
  <div class="field">
    <label>UTC time (hours, decimal)</label>
    <input type="number" id="time" value="5" min="0" max="24" step="0.5">
    <span class="help">e.g. 5 = 05:00 UTC = 10 PM PDT</span>
  </div>
  <div class="field">
    <label>Frames per second</label>
    <input type="number" id="fps" value="15" min="1" max="30" step="1">
  </div>
  <div class="field">
    <label>Latitude</label>
    <input type="number" id="lat" value="33.767" step="0.001">
  </div>
  <div class="field">
    <label>Longitude (east +, west &minus;)</label>
    <input type="number" id="long" value="-117.833" step="0.001">
  </div>
  <div class="field full">
    <div class="check-row">
      <label><input type="checkbox" id="hires"> Large display</label>
      <label><input type="checkbox" id="skip"> Reduce size (every other day)</label>
    </div>
  </div>
  <div class="field full">
    <div class="row">
      <button id="genSvg" onclick="generateSVG()">Generate SVG</button>
    </div>
  </div>
</div>

<div id="status"></div>
<iframe id="svg-player" style="display:none;border:none;background:#0a0a1a;"></iframe>

<script>
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return [m, d, y];
}

function getParams() {
  return {
    start: parseDate(document.getElementById('startDate').value),
    end:   parseDate(document.getElementById('endDate').value),
    time:  parseFloat(document.getElementById('time').value),
    lat:   parseFloat(document.getElementById('lat').value),
    long:  parseFloat(document.getElementById('long').value),
    fps:   parseInt(document.getElementById('fps').value)
  };
}

function setButtons(disabled) {
  document.getElementById('genSvg').disabled = disabled;
}

async function generateSVG() {
  const status = document.getElementById('status');
  const svgPlayer = document.getElementById('svg-player');
  svgPlayer.style.display = 'none';
  setButtons(true);
  status.className = '';
  status.textContent = 'Generating animated SVG...';

  const body = getParams();
  body.hires = document.getElementById('hires').checked ? 1 : 0;
  body.skip = document.getElementById('skip').checked ? 2 : 1;

  try {
    const resp = await fetch('api/generate-svg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await resp.json();
    if (resp.ok && result.url) {
      status.textContent = 'Done.';
      const hires = document.getElementById('hires').checked;
      svgPlayer.style.width = hires ? '2320px' : '1160px';
      svgPlayer.src = result.url;
      svgPlayer.style.display = 'block';
      svgPlayer.onload = function() {
        try {
          const doc = svgPlayer.contentDocument;
          const svg = doc.querySelector('svg');
          if (svg) {
            const vb = svg.getAttribute('viewBox').split(' ');
            const aspect = parseFloat(vb[3]) / parseFloat(vb[2]);
            svgPlayer.style.height = Math.round(parseInt(svgPlayer.style.width) * aspect) + 'px';
          }
        } catch(e) { svgPlayer.style.height = '800px'; }
      };
    } else {
      status.className = 'error';
      status.textContent = 'Error: ' + (result.error || 'Unknown error');
    }
  } catch (e) {
    status.className = 'error';
    status.textContent = 'Request failed: ' + e.message;
  }
  setButtons(false);
}

</script>

</body>
</html>
